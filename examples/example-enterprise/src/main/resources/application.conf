# korm-dsl/examples/example-enterprise/src/main/resources/application.conf

server {
    port = 8080
    port = ${?PORT}
    host = "0.0.0.0"
}

database {
    url = "jdbc:postgresql://localhost:5432/korm_enterprise"
    url = ${?DB_URL}
    driver = "org.postgresql.Driver"
    user = "postgres"
    user = ${?DB_USER}
    password = "password"
    password = ${?DB_PASSWORD}
    poolSize = 20
    poolSize = ${?DB_POOL_SIZE}
    connectionTimeout = 30000
    maxLifetime = 1800000
}

cache {
    maxSize = 10000
    maxSize = ${?CACHE_MAX_SIZE}
    ttlMinutes = 30
    ttlMinutes = ${?CACHE_TTL_MINUTES}
}

monitoring {
    enabled = true
    enabled = ${?MONITORING_ENABLED}
    slowQueryThresholdMs = 1000
    slowQueryThresholdMs = ${?SLOW_QUERY_THRESHOLD_MS}
    metricsInterval = 60000
}

security {
    jwtSecret = "change-this-in-production"
    jwtSecret = ${?JWT_SECRET}
    tokenExpiration = 86400000
}
